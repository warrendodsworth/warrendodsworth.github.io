  <g transform="translate(892 120)">
    <rect width="222" height="382" rx="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.09)" />
    <rect x="28" y="28" width="166" height="166" rx="24" fill="rgba(255,255,255,0.03)" />
    <path
